services:
  # PostgreSQL - Banco de dados único com schemas separados
  postgres-db:
    image: postgres:15-alpine
    container_name: microsservicos-postgres
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: admin_password
      POSTGRES_DB: microsservicos_db
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql
    restart: unless-stopped
    networks:
      - microsservicos-network

  # Serviço de Clientes (Node.js/Express)
  servico-clientes:
    build:
      context: ./servico-clientes
      dockerfile: Dockerfile
    container_name: servico-clientes
    environment:
      - NODE_ENV=production
      - DB_HOST=postgres-db
      - DB_PORT=5432
      - DB_USER=admin
      - DB_PASSWORD=admin_password
      - DB_NAME=microsservicos_db
      - DB_SCHEMA=clientes
    depends_on:
      - postgres-db
    restart: unless-stopped
    networks:
      - microsservicos-network

  # Serviço de Produtos (Java/Spring Boot)
  servico-produtos:
    build:
      context: ./servico-produtos
      dockerfile: Dockerfile
    container_name: servico-produtos
    environment:
      - SPRING_DATASOURCE_URL=jdbc:postgresql://postgres-db:5432/microsservicos_db
      - SPRING_DATASOURCE_USERNAME=admin
      - SPRING_DATASOURCE_PASSWORD=admin_password
      - SPRING_JPA_PROPERTIES_HIBERNATE_DEFAULT_SCHEMA=produtos
    ports:
      - "8081"
    depends_on:
      - postgres-db
    restart: unless-stopped
    networks:
      - microsservicos-network

  # Serviço de Pedidos (Java/Spring Boot)
  servico-pedidos:
    build:
      context: ./servico-pedidos
      dockerfile: Dockerfile
    container_name: servico-pedidos
    environment:
      - SPRING_DATASOURCE_URL=jdbc:postgresql://postgres-db:5432/microsservicos_db
      - SPRING_DATASOURCE_USERNAME=admin
      - SPRING_DATASOURCE_PASSWORD=admin_password
      - SPRING_JPA_PROPERTIES_HIBERNATE_DEFAULT_SCHEMA=pedidos
    ports:
      - "8082"
    depends_on:
      - postgres-db
    restart: unless-stopped
    networks:
      - microsservicos-network

  # API Gateway (Nginx)
  api-gateway:
    image: nginx:1.25-alpine
    container_name: api-gateway
    ports:
      - "8080:8080"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./frontend:/usr/share/nginx/html:ro
    depends_on:
      - servico-clientes
      - servico-produtos
      - servico-pedidos
    restart: unless-stopped
    networks:
      - microsservicos-network

networks:
  microsservicos-network:
    driver: bridge

volumes:
  postgres_data:
