<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Produtos | Microsserviços</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Playfair+Display:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/layout.css">
    <link rel="stylesheet" href="css/components.css">
    <link rel="stylesheet" href="css/utilities.css">
</head>
<body>
    <div class="app-layout">
        <aside class="sidebar">
            <h2 class="logo font-editorial">Microsserviços</h2>
            <nav class="nav-menu">
                <a href="index.html">Visão Geral</a>
                <a href="produtos.html" class="active">Produtos</a>
                <a href="clientes.html">Clientes</a>
                <a href="pedidos.html">Pedidos</a>
            </nav>
        </aside>
        <main class="content">
            <header class="page-header d-flex justify-between align-center">
                <div>
                    <h1>Produtos</h1>
                    <p class="page-description">Catálogo e gestão de itens comerciais.</p>
                </div>
                <button class="primary font-data" onclick="app.toggleActionPanel('panel-novo-produto')">Novo Produto</button>
            </header>

            <section class="section action-panel" id="panel-novo-produto" style="display: none; margin-bottom: var(--spacing-lg); border: 1px solid var(--border-color); padding: var(--spacing-md);">
                <h3 class="mb-md">Cadastrar Produto</h3>
                <form id="form-produto" class="d-flex flex-column gap-sm">
                    <div class="input-field">
                        <label for="nome-produto">Nome do Produto</label>
                        <input type="text" id="nome-produto" required />
                    </div>
                    <div class="input-field">
                        <label for="preco-produto">Preço (R$)</label>
                        <input type="number" step="0.01" id="preco-produto" required />
                    </div>
                    <div class="action-bar mt-0">
                        <button type="button" onclick="app.toggleActionPanel('panel-novo-produto')">Cancelar</button>
                        <button type="submit" class="primary">Salvar Produto</button>
                    </div>
                </form>
            </section>
            
            <section class="section">
                <table class="table-editorial" id="tabela-produtos">
                    <thead>
                        <tr>
                            <th>ID</th>
                            <th>Nome</th>
                            <th>Preço</th>
                            <th class="text-right">Ações</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr>
                            <td colspan="4" class="text-center">Carregando itens...</td>
                        </tr>
                    </tbody>
                </table>
            </section>
        </main>
    </div>
    
    <script src="js/api.js"></script>
    <script src="js/app.js"></script>
    <script src="js/produtos.js"></script>
</body>
</html>
