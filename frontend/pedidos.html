<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pedidos | Microsserviços</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Playfair+Display:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/layout.css">
    <link rel="stylesheet" href="css/components.css">
    <link rel="stylesheet" href="css/utilities.css">
</head>
<body>
    <div class="app-layout">
        <aside class="sidebar">
            <h2 class="logo font-editorial">Microsserviços</h2>
            <nav class="nav-menu">
                <a href="index.html">Visão Geral</a>
                <a href="produtos.html">Produtos</a>
                <a href="clientes.html">Clientes</a>
                <a href="pedidos.html" class="active">Pedidos</a>
            </nav>
        </aside>
        <main class="content">
            <header class="page-header d-flex justify-between align-center">
                <div>
                    <h1>Pedidos</h1>
                    <p class="page-description">Histórico estruturado de compras realizadas.</p>
                </div>
                <button class="primary font-data" onclick="app.toggleActionPanel('panel-novo-pedido')">Emitir Pedido</button>
            </header>

            <section class="section action-panel" id="panel-novo-pedido" style="display: none; margin-bottom: var(--spacing-lg); border: 1px solid var(--border-color); padding: var(--spacing-md);">
                <h3 class="mb-md">Novo Pedido</h3>
                <form id="form-pedido" class="d-flex flex-column gap-sm">
                    <div class="input-field">
                        <label for="cliente-pedido">Selecionar Cliente</label>
                        <select id="cliente-pedido" required>
                            <option value="">Carregando clientes...</option>
                        </select>
                    </div>
                    <div class="input-field">
                        <label for="produto-pedido">Selecionar Produto</label>
                        <select id="produto-pedido" required>
                            <option value="">Carregando produtos...</option>
                        </select>
                    </div>
                    <div class="input-field">
                        <label for="quantidade-pedido">Quantidade</label>
                        <input type="number" min="1" id="quantidade-pedido" required />
                    </div>
                    <div class="input-field">
                        <label for="status-pedido">Status</label>
                        <select id="status-pedido">
                            <option value="CRIADO" selected>Criado</option>
                            <option value="PAGO">Pago</option>
                            <option value="CANCELADO">Cancelado</option>
                        </select>
                    </div>
                    <div class="action-bar mt-0">
                        <button type="button" onclick="app.toggleActionPanel('panel-novo-pedido')">Cancelar</button>
                        <button type="submit" class="primary">Concluir Pedido</button>
                    </div>
                </form>
            </section>
            
            <section class="section">
                <table class="table-editorial" id="tabela-pedidos">
                    <thead>
                        <tr>
                            <th>Nº Doc</th>
                            <th>Cliente</th>
                            <th>Total (R$)</th>
                            <th>Status</th>
                            <th>Data</th>
                            <th>Detalhes</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr>
                            <td colspan="6" class="text-center">Carregando ordens...</td>
                        </tr>
                    </tbody>
                </table>
            </section>
        </main>
    </div>

    <div id="pedido-detalhes-modal" class="modal hidden">
        <div class="modal-overlay" onclick="fecharModalDetalhes()"></div>
        <div class="modal-content">
            <button type="button" class="modal-close" onclick="fecharModalDetalhes()">×</button>
            <h2>Detalhes do Pedido</h2>
            <div class="modal-body" id="modal-detalhes-conteudo">
                <p><strong>Produto:</strong> <span id="modal-produto-nome"></span></p>
                <p><strong>Quantidade:</strong> <span id="modal-produto-quantidade"></span></p>
                <p><strong>Valor Unitário:</strong> <span id="modal-produto-preco"></span></p>
                <p><strong>Valor Total:</strong> <span id="modal-produto-total"></span></p>
            </div>
        </div>
    </div>
    
    <script src="js/api.js"></script>
    <script src="js/app.js"></script>
    <script src="js/pedidos.js"></script>
</body>
</html>
