<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Visão Geral | Microsserviços</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Playfair+Display:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/layout.css">
    <link rel="stylesheet" href="css/components.css">
    <link rel="stylesheet" href="css/utilities.css">
</head>
<body>
    <div class="app-layout">
        <aside class="sidebar">
            <h2 class="logo font-editorial">Microsserviços</h2>
            <nav class="nav-menu">
                <a href="index.html" class="active">Visão Geral</a>
                <a href="produtos.html">Produtos</a>
                <a href="clientes.html">Clientes</a>
                <a href="pedidos.html">Pedidos</a>
            </nav>
        </aside>
        <main class="content">
            <header class="page-header">
                <h1>Visão Geral</h1>
                <p class="page-description">Métricas e acompanhamento geral da operação.</p>
            </header>
            
            <section class="section">
                <div class="grid-container">
                    <div class="stat-card">
                        <div class="stat-card-title">Produtos Cadastrados</div>
                        <div class="stat-card-value" id="stat-produtos">--</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-card-title">Clientes Ativos</div>
                        <div class="stat-card-value" id="stat-clientes">--</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-card-title">Total de Pedidos</div>
                        <div class="stat-card-value" id="stat-pedidos">--</div>
                    </div>
                </div>
            </section>
        </main>
    </div>
    
    <script src="js/api.js"></script>
    <script src="js/app.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', async () => {
            try {
                const produtos = await window.api.get('produtos', '/') || []; // Changed
                document.getElementById('stat-produtos').innerText = produtos.length;
            } catch(e) { /* ... */ }

            try {
                const clientes = await window.api.get('clientes', '/') || []; // Changed
                document.getElementById('stat-clientes').innerText = clientes.length;
            } catch(e) { /* ... */ }

            try {
                const pedidos = await window.api.get('pedidos', '/') || []; // Changed
                document.getElementById('stat-pedidos').innerText = pedidos.length;
            } catch(e) { /* ... */ }
        });
    </script>
</body>
</html>
